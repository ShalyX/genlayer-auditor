<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenLayer Auditor</title>
    <meta name="description" content="GenLayer Auditor performs security and interpretation-risk review for GenLayer Intelligent Contracts.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-shell">
        <header class="topbar">
            <a class="brand" href="/" aria-label="GenLayer Auditor home">
                <span class="brand-mark" aria-hidden="true">GA</span>
                <span>
                    <strong>GenLayer Auditor</strong>
                    <small>Interpretation risk console</small>
                </span>
            </a>

            <div class="topbar-actions">
                <div class="status-badge" id="statusBadge">
                    <span class="pulse-dot"></span> System Ready
                </div>
                <button type="button" class="btn-secondary btn-export" id="downloadReportBtn" disabled>Export .md</button>
            </div>
        </header>

        <section class="workspace">
            <section class="editor-pane panel">
                <div class="panel-header">
                    <div>
                        <p class="eyebrow">Audit Input</p>
                        <h1>Contract review</h1>
                    </div>
                    <div class="sample-actions" aria-label="Sample contracts">
                        <button type="button" class="btn-secondary" id="loadRiskySample">Risky sample</button>
                        <button type="button" class="btn-secondary" id="loadCleanSample">Clean sample</button>
                    </div>
                </div>

                <form id="auditForm" class="audit-form">
                    <label class="field-label" for="contractName">Contract file</label>
                    <input type="text" id="contractName" placeholder="PredictionMarket.py" required>

                    <div class="editor-toolbar">
                        <label class="field-label" for="contractSource">Source</label>
                        <div class="specialist-strip" aria-label="Active specialists">
                            <label><input type="checkbox" checked disabled> Interpretation</label>
                            <label><input type="checkbox" checked disabled> Adversarial</label>
                            <label><input type="checkbox" checked> Reality</label>
                            <label><input type="checkbox" checked> Consensus</label>
                        </div>
                    </div>

                    <div class="code-shell">
                        <textarea id="contractSource" rows="18" wrap="off" placeholder="Paste GenLayer Python contract source..." required></textarea>
                        <div class="source-preview" id="sourcePreview" aria-label="Source line preview"></div>
                    </div>

                    <button type="submit" class="btn-primary" id="runAuditBtn">
                        <span class="btn-text">Run audit</span>
                        <span class="btn-icon" aria-hidden="true">></span>
                    </button>
                </form>
            </section>

            <section class="analysis-pane">
                <section class="panel verdict-panel">
                    <div class="panel-header compact">
                        <div>
                            <p class="eyebrow">Live Verdict</p>
                            <h2>Risk posture</h2>
                        </div>
                        <div id="finalVerdictBanner" class="verdict-banner" style="display: none;"></div>
                    </div>

                    <div class="metrics-grid">
                        <article class="metric-card">
                            <span>Consensus</span>
                            <strong id="metricConsensus" class="metric-value">--</strong>
                        </article>
                        <article class="metric-card">
                            <span>Appeal</span>
                            <strong id="metricAppeal" class="metric-value">--</strong>
                        </article>
                        <article class="metric-card">
                            <span>Drift</span>
                            <strong id="metricDrift" class="metric-value">--</strong>
                        </article>
                        <article class="metric-card">
                            <span>Reality</span>
                            <strong id="metricReality" class="metric-value">--</strong>
                        </article>
                        <article class="metric-card">
                            <span>Compute</span>
                            <strong id="metricCompute" class="metric-value">--</strong>
                        </article>
                        <article class="metric-card">
                            <span>Code Risk</span>
                            <strong id="metricDeterministic" class="metric-value">--</strong>
                        </article>
                    </div>

                    <div id="summaryPanel" class="summary-panel" style="display: none;"></div>
                </section>

                <section class="panel terminal-panel">
                    <div class="terminal-header">
                        <span>audit stream</span>
                        <span class="terminal-state">live</span>
                    </div>
                    <div class="terminal-body" id="terminalOutput">
                        <div class="log-line system">Waiting for contract submission...</div>
                    </div>
                </section>
            </section>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
